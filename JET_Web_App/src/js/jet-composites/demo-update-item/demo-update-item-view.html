<!-- <oj-form-layout id="form-container" label-edge="[[labelEdge]]"></oj-form-layout> -->
<oj-form-layout label-edge="[[labelEdge]]">
   
  <oj-label-value>
    <oj-label slot="label">Item ID</oj-label>
    
    <div slot="value">
      <oj-bind-text value="[[$properties.itemId]]"></oj-bind-text>
    </div>
   </oj-label-value>  
   <!-- The oj-label-value element defines a slot that uses the oj-bind-text element to modify the Item ID field to read-only. -->
   <!-- <oj-input-text value="ID number" label-hint="Item ID"></oj-input-text> -->
   
   <oj-input-text value="{{$properties.itemName}}" label-hint="Item Name"></oj-input-text>
   
   <oj-input-text value="{{$properties.itemPrice}}" help.instruction="enter an amount with or without grouping seperator" converter="[[currency]]" label-hint="Item Price"></oj-input-text>
   
   <oj-input-text value="{{$properties.itemDesc}}" validators="[[validators]]" placeholder="Enter a description of 5 - 50 characters" label-hint="Item Description"></oj-input-text>
</oj-form-layout>
